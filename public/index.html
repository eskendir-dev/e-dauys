<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Dauys | Система голосования</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="official-header">
        <h1>e-Dauys</h1>
        <p>Национальная система электронного голосования</p>
    </header>

    <main id="app-container">
        <section id="view-auth" class="view active">
            <div class="auth-box">
                <h2>Вход в систему</h2>
                <div class="tabs">
                    <button id="tab-voter" class="active">Избиратель</button>
                    <button id="tab-admin">Администратор</button>
                </div>
                
                <div id="form-voter" class="auth-form">
                    <label>Код голосования</label>
                    <input type="text" id="voter-code" placeholder="Код опроса">
                    <label>Ваш ИИН</label>
                    <input type="text" id="voter-iin" maxlength="12" placeholder="12 цифр">
                    <button id="btn-voter-auth">Получить код</button>
                    <div id="voter-otp-block" class="hidden auth-form">
                        <label>Введите OTP</label>
                        <input type="text" id="voter-otp" placeholder="0000">
                        <button id="btn-voter-verify">Войти</button>
                    </div>
                </div>

                <div id="form-admin" class="auth-form hidden">
                    <label>ИИН Администратора</label>
                    <input type="text" id="admin-iin" maxlength="12" placeholder="12 цифр">
                    <button id="btn-admin-auth">Запросить доступ</button>
                    <div id="admin-otp-block" class="hidden auth-form">
                        <label>OTP из почты</label>
                        <input type="text" id="admin-otp" placeholder="0000">
                        <button id="btn-admin-verify">Авторизоваться</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-admin" class="view hidden">
            <div class="dashboard">
                <div class="dashboard-header">
                    <div class="profile-block">
                        <h2>Профиль: Администратор</h2>
                        <span class="status-badge">Сессия активна</span>
                    </div>
                    <div class="actions">
                        <button id="btn-test-vote" class="outline-btn">Режим тест.</button>
                        <button id="btn-logout" class="danger-btn">Выход</button>
                    </div>
                </div>
                
                <nav class="admin-nav">
                    <button id="nav-active" class="active">Активные голосования</button>
                    <button id="nav-create">Создать форму</button>
                </nav>

                <div id="subview-active" class="subview active">
                    <div id="active-polls-list" class="polls-grid"></div>
                </div>

                <div id="subview-create" class="subview hidden">
                    <div id="questions-container"></div>
                    <button id="btn-add-question" class="outline-btn add-btn">+ Добавить вопрос</button>
                    
                    <div class="gf-card">
                        <h3>Настройки времени</h3>
                        <div class="datetime-grid">
                            <div>
                                <label>Дата окончания (Календарь)</label>
                                <input type="date" id="poll-date">
                            </div>
                            <div>
                                <label>Время окончания (Часы:Минуты)</label>
                                <input type="time" id="poll-time">
                            </div>
                        </div>
                    </div>
                    
                    <button id="btn-create-poll" class="primary-btn submit-poll-btn">Запустить голосование</button>
                    <div id="admin-message" class="hidden message-box"></div>
                </div>
            </div>
        </section>

        <section id="view-voting" class="view hidden">
            <div class="voting-interface dashboard">
                <div class="dashboard-header">
                    <h2>Бюллетень</h2>
                    <button id="btn-back-admin" class="outline-btn hidden">Вернуться</button>
                </div>
                <div class="timer-box">До конца: <span id="time-left">--:--:--</span></div>
                <div id="poll-questions"></div>
                <button id="btn-submit-vote" class="primary-btn submit-poll-btn">Отправить голос</button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
