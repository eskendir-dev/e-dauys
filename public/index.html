<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Dauys | Государственная система голосования</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="official-header">
        <h1>e-Dauys</h1>
        <p>Национальная система электронного голосования</p>
    </header>

    <main id="app-container">
        <section id="view-auth" class="view active">
            <div class="auth-box">
                <h2>Вход в систему</h2>
                <div class="tabs">
                    <button id="tab-voter" class="active">Избиратель</button>
                    <button id="tab-admin">Администратор</button>
                </div>
                
                <div id="form-voter" class="auth-form">
                    <input type="text" id="voter-code" placeholder="Код голосования">
                    <input type="text" id="voter-iin" placeholder="Ваш ИИН (12 цифр)">
                    <button id="btn-voter-auth">Получить код</button>
                    <div id="voter-otp-block" class="hidden">
                        <input type="text" id="voter-otp" placeholder="Введите OTP">
                        <button id="btn-voter-verify">Войти</button>
                    </div>
                </div>

                <div id="form-admin" class="auth-form hidden">
                    <input type="text" id="admin-iin" placeholder="ИИН Администратора">
                    <button id="btn-admin-auth">Отправить запрос</button>
                    <div id="admin-otp-block" class="hidden">
                        <input type="text" id="admin-otp" placeholder="Введите OTP из письма">
                        <button id="btn-admin-verify">Авторизоваться</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-admin" class="view hidden">
            <div class="dashboard">
                <div class="dashboard-header">
                    <h2>Панель управления</h2>
                    <div class="actions">
                        <button id="btn-test-vote">Режим избирателя (Тест)</button>
                        <button id="btn-logout">Выйти</button>
                    </div>
                </div>
                
                <div class="constructor">
                    <h3>Конструктор формы</h3>
                    <div id="questions-container"></div>
                    <button id="btn-add-question">+ Добавить вопрос</button>
                    
                    <div class="poll-settings">
                        <label>Дата и время окончания:</label>
                        <input type="datetime-local" id="poll-deadline">
                    </div>
                    
                    <button id="btn-create-poll" class="primary-btn">Создать голосование</button>
                    <div id="admin-message"></div>
                </div>
            </div>
        </section>

        <section id="view-voting" class="view hidden">
            <div class="voting-interface">
                <div class="timer-box">
                    Осталось времени: <span id="time-left">--:--:--</span>
                </div>
                <div id="poll-questions" class="poll-content"></div>
                <button id="btn-submit-vote" class="primary-btn">Отправить голос</button>
                <button id="btn-back-admin" class="hidden">Вернуться в админку</button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
